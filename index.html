<div id="repo-list">Loading projects...</div>

<script>
    fetch('https://api.github.com/users/RuGG12/repos?sort=updated')
    .then(response => response.json())
    .then(data => {
        const list = document.getElementById('repo-list');
        list.innerHTML = ''; // Clear loading text
        data.forEach(repo => {
            if (!repo.fork) { // Only show your original work, not forks
                const item = document.createElement('div');
                item.innerHTML = `<h3><a href="${repo.html_url}">${repo.name}</a></h3><p>${repo.description || 'No description'}</p>`;
                list.appendChild(item);
            }
        });
    });
</script>
